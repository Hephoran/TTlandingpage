global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http
    bind *:80
    # ACME challenge for Let's Encrypt
    acl is_acme path_beg /.well-known/acme-challenge/
    use_backend certbot if is_acme
    # Redirect all other HTTP to HTTPS
    http-request redirect scheme https unless is_acme

frontend https
    bind *:443 ssl crt /etc/haproxy/certs/
    http-request set-header X-Forwarded-Proto https
    default_backend app

backend app
    server app1 app:3000 check

backend certbot
    server certbot certbot:80
